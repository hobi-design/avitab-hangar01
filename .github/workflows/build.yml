name: Build AviTab

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    # macos-12 is deprecated/removed by GitHub Actions.
    # macos-13 is the correct Intel (x86_64) runner for a 2019 Mac.
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake --preset release -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_OSX_ARCHITECTURES=x86_64

    - name: Build
      run: cmake --build --preset release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avitab-build-mac
        path: install/
