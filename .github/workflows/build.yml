name: Build AviTab

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-mac:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake --preset release -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_OSX_ARCHITECTURES=x86_64

    - name: Build
      run: cmake --build --preset release

    - name: Zip
      run: cd install/avitab/xplane && zip -r ../../../avitab-mac.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avitab-mac
        path: avitab-mac.zip

  build-linux:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libgl1-mesa-dev libglu1-mesa-dev \
          libx11-dev libxrandr-dev libxinerama-dev \
          libxcursor-dev libxi-dev libxext-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols \
          libfontconfig1-dev

    - name: Configure CMake
      run: cmake --preset release

    - name: Build
      run: cmake --build --preset release

    - name: Zip
      run: cd install/avitab/xplane && zip -r ../../../avitab-linux.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avitab-linux
        path: avitab-linux.zip

  build-windows:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-mesa
          zip

    - name: Configure CMake
      shell: msys2 {0}
      run: cmake --preset release

    - name: Build
      shell: msys2 {0}
      run: cmake --build --preset release

    - name: Zip
      shell: msys2 {0}
      run: cd install/avitab/xplane && zip -r ../../../avitab-windows.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: avitab-windows
        path: avitab-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-mac, build-linux, build-windows ]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          avitab-mac/avitab-mac.zip
          avitab-linux/avitab-linux.zip
          avitab-windows/avitab-windows.zip
